name: Build portfolio assets

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'requirements.txt'
      - '.github/workflows/build-portfolio.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Generate data, analysis, figures, and notebook
        env:
          OMP_NUM_THREADS: 1
          OPENBLAS_NUM_THREADS: 1
          MKL_NUM_THREADS: 1
          NUMEXPR_NUM_THREADS: 1
        run: |
          python src/generate_data.py
          python src/analyze.py
          python src/build_notebook.py
          jupyter nbconvert --to notebook --execute --inplace notebooks/01_fmcg_customer_insights.ipynb --ExecutePreprocessor.timeout=180
      - name: Commit generated assets
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data outputs notebooks
          if git diff --cached --quiet; then
            echo 'No generated changes.'
          else
            git commit -m 'Generate portfolio data and analysis outputs'
            git push
          fi

name: Reproduce analysis

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '02_Script/**'
      - 'README.md'
      - 'requirements.txt'
      - '.github/workflows/reproduce-analysis.yml'

permissions:
  contents: write

jobs:
  reproduce:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate reproducible data, results, notebook, and figures
        env:
          OMP_NUM_THREADS: 1
          OPENBLAS_NUM_THREADS: 1
          MKL_NUM_THREADS: 1
          NUMEXPR_NUM_THREADS: 1
        run: |
          python 02_Script/01_Generate_Synthetic_Data.py
          python 02_Script/02_FMCG_Customer_Insights_Analysis.py
          python 02_Script/03_Build_Analysis_Notebook.py
          jupyter nbconvert --to notebook --execute --inplace 02_Script/FMCG_Customer_Insights_Analysis.ipynb --ExecutePreprocessor.timeout=180
          python 02_Script/04_Build_Portfolio_PDFs.py

      - name: Verify README assets
        run: |
          test -f 04_Output/figures/01_segment_sizes.png
          test -f 04_Output/figures/02_segment_profile_heatmap.png
          test -f 04_Output/figures/03_channel_by_segment.png
          test -f 04_Output/figures/05_purchase_intention_drivers.png
          test -f 04_Output/figures/07_purchase_intention_roc_curve.png
          test -f 04_Output/tables/key_metrics.json
          test -f 02_Script/FMCG_Customer_Insights_Analysis.ipynb

      - name: Commit generated analysis assets
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add 01_Report/*.pdf 02_Script/*.ipynb 03_Data 04_Output
          if git diff --cached --quiet; then
            echo 'Generated assets are already current.'
          else
            git commit -m 'Reproduce customer insights analysis assets'
            git push
          fi
